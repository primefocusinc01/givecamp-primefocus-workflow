name: Deploy to Firebase Hosting

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Firebase Hosting channel (live or a preview channel name)'
        required: false
        default: 'live'
        type: string

env:
  VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
  VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
  VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: PVF_React_Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./PVF_React_Frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./PVF_React_Frontend

      - name: Write service account key
        shell: bash
        env:
          FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_KEY" > /tmp/service-account.json

      - name: Deploy Firestore rules
        shell: bash
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          npx firebase-tools deploy --only firestore:rules

      - name: Deploy to Firebase Hosting
        shell: bash
        run: |
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/service-account.json
          if [ "${{ github.event.inputs.channel }}" == "live" ]; then
            npx firebase-tools deploy --only hosting
          else
            npx firebase-tools hosting:channel:deploy ${{ github.event.inputs.channel }} --expires 7d
          fi

      - name: Remove service account key
        if: always()
        shell: bash
        run: |
          rm -f /tmp/service-account.json
